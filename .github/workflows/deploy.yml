name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create docs directory
        run: mkdir -p docs

      - name: Copy documentation files
        run: |
          cp index.html docs/ 2>/dev/null || echo "index.html not found"
          cp IMPLEMENTATION_REVIEW.md docs/ 2>/dev/null || echo "IMPLEMENTATION_REVIEW.md not found"
          cp README.md docs/ 2>/dev/null || echo "README.md not found"
          cp COMPONENT_REVIEW.md docs/ 2>/dev/null || echo "COMPONENT_REVIEW.md not found"
          cp DEVELOPMENT.md docs/ 2>/dev/null || echo "DEVELOPMENT.md not found"
          cp UI_GUIDE.md docs/ 2>/dev/null || echo "UI_GUIDE.md not found"
          cp TEST_REPORT.md docs/ 2>/dev/null || echo "TEST_REPORT.md not found"

      - name: Copy server documentation
        run: |
          mkdir -p docs/server
          cp server/docs/*.md docs/server/ 2>/dev/null || echo "Server docs not found"
          cp server/docs/openapi.yaml docs/server/ 2>/dev/null || echo "OpenAPI spec not found"

      - name: Copy infrastructure documentation
        run: |
          mkdir -p docs/infrastructure
          cp infrastructure/*.md docs/infrastructure/ 2>/dev/null || echo "Infrastructure docs not found"
          cp infrastructure/DISASTER_RECOVERY.md docs/infrastructure/ 2>/dev/null || echo "Disaster recovery doc not found"

      - name: Generate API documentation
        run: |
          echo "# API Documentation" > docs/api.md
          echo "## Authentication" >> docs/api.md
          echo "- POST /auth/register" >> docs/api.md
          echo "- POST /auth/login" >> docs/api.md
          echo "- POST /auth/refresh" >> docs/api.md
          echo "## Tracks" >> docs/api.md
          echo "- GET /tracks" >> docs/api.md
          echo "- POST /tracks" >> docs/api.md
          echo "- GET /tracks/:id" >> docs/api.md
          echo "## Sessions" >> docs/api.md
          echo "- GET /sessions" >> docs/api.md
          echo "- POST /sessions" >> docs/api.md
          echo "- GET /sessions/:id" >> docs/api.md

      - name: Generate index page
        run: |
          echo "# Race Wars Documentation" > docs/index.md
          echo "" >> docs/index.md
          echo "## Overview" >> docs/index.md
          echo "- [README](README.md)" >> docs/index.md
          echo "- [Development Guide](DEVELOPMENT.md)" >> docs/index.md
          echo "- [UI Guide](UI_GUIDE.md)" >> docs/index.md
          echo "- [Test Report](TEST_REPORT.md)" >> docs/index.md
          echo "- [Component Review](COMPONENT_REVIEW.md)" >> docs/index.md
          echo "- [Implementation Review](IMPLEMENTATION_REVIEW.md)" >> docs/index.md
          echo "" >> docs/index.md
          echo "## API Documentation" >> docs/index.md
          echo "- [API Reference](api.md)" >> docs/index.md
          echo "- [OpenAPI Spec](server/docs/openapi.yaml)" >> docs/index.md
          echo "" >> docs/index.md
          echo "## Infrastructure" >> docs/index.md
          echo "- [Infrastructure](infrastructure/)" >> docs/index.md

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: docs/
          retention-days: 1

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-docs
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Download docs artifact
        uses: actions/download-artifact@v4
        with:
          name: docs
          path: docs/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
