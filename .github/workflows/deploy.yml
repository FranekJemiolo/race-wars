name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create docs directory
        run: mkdir -p docs

      - name: Copy documentation files
        run: |
          cp index.html docs/
          cp IMPLEMENTATION_REVIEW.md docs/
          cp README.md docs/ 2>/dev/null || echo "README not found"
          cp race_wars.md docs/ 2>/dev/null || echo "Spec not found"

      - name: Generate API documentation
        run: |
          echo "# API Documentation" > docs/api.md
          echo "## Authentication" >> docs/api.md
          echo "- POST /auth/register" >> docs/api.md
          echo "- POST /auth/login" >> docs/api.md
          echo "- POST /auth/refresh" >> docs/api.md
          echo "## Tracks" >> docs/api.md
          echo "- GET /tracks" >> docs/api.md
          echo "- POST /tracks" >> docs/api.md
          echo "- GET /tracks/:id" >> docs/api.md

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: docs/
          retention-days: 1

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-docs
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Download docs artifact
        uses: actions/download-artifact@v4
        with:
          name: docs
          path: docs/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
