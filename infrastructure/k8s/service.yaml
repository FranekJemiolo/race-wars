apiVersion: v1
kind: Service
metadata:
  name: race-wars-server
  namespace: race-wars
  labels:
    app: race-wars
    component: server
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  - port: 8081
    targetPort: 8081
    protocol: TCP
    name: websocket
  selector:
    app: race-wars
    component: server
