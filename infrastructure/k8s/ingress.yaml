apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: race-wars-ingress
  namespace: race-wars
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/websocket-services: "race-wars-server"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  tls:
  - hosts:
    - api.racewars.com
    secretName: race-wars-tls
  rules:
  - host: api.racewars.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: race-wars-server
            port:
              number: 8080
