version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: race-wars-db
    environment:
      POSTGRES_DB: race_wars
      POSTGRES_USER: race_wars
      POSTGRES_PASSWORD: race_wars_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U race_wars -d race_wars"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: race-wars-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
